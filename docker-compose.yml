services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: mathpath
      POSTGRES_PASSWORD: mathpath
      POSTGRES_DB: mathpath
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mathpath"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://mathpath:mathpath@db:5432/mathpath
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
    command: >
      sh -c "uv run alembic upgrade head && uv run python -c 'from app.core.network import print_local_ip; print_local_ip()' && uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  pgdata:
  uploads:
